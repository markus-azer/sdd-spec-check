name: release

# Tag push (v*) -> build per-platform binaries -> publish a GitHub Release.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,    os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { name: darwin-x64,   os: macos-latest,   target: x86_64-apple-darwin }
          - { name: darwin-arm64, os: macos-latest,   target: aarch64-apple-darwin }
          - { name: win32-x64,    os: windows-latest, target: x86_64-pc-windows-msvc, ext: .exe }
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sdd-spec-check${{ matrix.ext }}" \
             "dist/sdd-spec-check-${{ matrix.name }}${{ matrix.ext }}"

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.name }}
          path: dist/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes
          gh release upload "$TAG" dist/* --clobber
